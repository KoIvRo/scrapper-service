services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      POSTGRES_DB: project
    ports:
      - "5432:5432"
    networks:
      - test-network
    volumes:
      - postgres_data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --port 6379 --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - test-network
    volumes:
      - valkey_data:/data

  bot:
    build: ./bot
    environment:
      SCRAPPER_URL: http://scrapper:8001
      NOTIFICATION_TYPE: http
    ports:
      - "8000:8000"
    networks:
      - test-network
    depends_on:
      - postgres

  scrapper:
    build: ./scrapper
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      POSTGRES_DB: project
      BOT_URL: http://bot:8000
      NOTIFICATION_TYPE: http
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_TTL: 300
    ports:
      - "8001:8001"
    networks:
      - test-network
    depends_on:
      - postgres
      - valkey

volumes:
  postgres_data:
  valkey_data:

networks:
  test-network:
    driver: bridge
