services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      POSTGRES_DB: project
    ports:
      - "5432:5432"
    networks:
      - test-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - test-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - test-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - test-network

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --port 6379 --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - test-network

  scrapper:
    build: ../scrapper
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      POSTGRES_DB: project
      BOT_URL: http://fake-bot:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: link-updates
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      NOTIFICATION_TYPE: kafka
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_TTL: 300
      access_type: orm
    ports:
      - "8001:8001"
    networks:
      - test-network
    depends_on:
      - postgres
      - kafka
      - schema-registry
      - valkey

networks:
  test-network:
    driver: bridge
