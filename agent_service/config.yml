filters:
  authors:
   - KoIvRo
   - BombordiroKrocodilo
  stop_words:
   - реклама
   - ad
   - spam
   - promo
   - cheap
  min_length: 10
  threshold: 30
  high_words:
   - critical
   - fix
   - security
   - breaking
   - bug
  low_words:
   - minor
   - lint
   - chore
   - docs
   - typo
  window_ms: 30000


ai:
  use_ai: false
  url: https://router.huggingface.co/v1/chat/completions
  model: "deepseek-ai/DeepSeek-V4-Flash:fireworks-ai"

circuit_breaker:
  failure_threshold: 2
  recovery_timeout: 20

logger:
  level: INFO
  output: stdout

timeout:
  connect: 10
  read: 10
  write: 10
  pool: 10

retry:
  max_attempts: 5
  exponential_multiplier: 1.0
  exponential_min_seconds: 1.0
  exponential_max_seconds: 30.0
  status_codes: [500,502,503,504]
